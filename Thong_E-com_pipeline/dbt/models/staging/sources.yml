version: 2

sources:
  - name: raw
    database: "{{ env_var('GCP_PROJECT_ID') }}"
    schema: "{{ env_var('BQ_DATASET', 'ecom_warehouse') }}"
    description: "Raw tables loaded từ GCS vào BigQuery"
    tables:
      - name: raw_orders
        description: "Orders raw data từ PostgreSQL staging qua GCS"
        columns:
          - name: order_id
            description: "Primary key"
            tests:
              - not_null
              - unique
          - name: status
            tests:
              - accepted_values:
                  values: ['completed', 'pending', 'cancelled']

      - name: raw_customers
        description: "Customers raw data"
        columns:
          - name: customer_id
            tests:
              - not_null

      - name: raw_products
        description: "Products raw data"
        columns:
          - name: product_id
            tests:
              - not_null
